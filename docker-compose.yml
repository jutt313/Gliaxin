version: "3.9"

services:
  db:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: gliaxin
      POSTGRES_PASSWORD: gliaxin
      POSTGRES_DB: gliaxin
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gliaxin"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: ./backend
    restart: unless-stopped
    env_file: .env
    ports:
      - "${PORT:-9823}:9823"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://gliaxin:gliaxin@db:5432/gliaxin

volumes:
  pgdata:
